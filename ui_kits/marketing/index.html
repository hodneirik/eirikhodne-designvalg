<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing UI kit — Eirik Hodne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ───── kit.css inlined (sandbox cannot fetch external css) ───── */
.eh-page *, .eh-page *::before, .eh-page *::after,
.eh-startside *, .eh-startside *::before, .eh-startside *::after { box-sizing: border-box; margin: 0; padding: 0; }
.eh-page { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
.eh-startside { position: relative; width: 100%; min-height: 100vh; background: #F7F9F8; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
.eh-startside__block { position: absolute; z-index: 0; top: 0; right: 0; width: 50%; height: 100%; background: #12161C; transform: translateX(100%); transition: transform 2.2s cubic-bezier(0.22, 1, 0.36, 1); }
.eh-startside[data-mounted="true"] .eh-startside__block { transform: translateX(0); }
.eh-startside__ui { position: absolute; z-index: 1; top: 50%; left: 0; right: 0; transform: translateY(-50%); display: flex; flex-direction: column; align-items: flex-start; gap: 20px; padding: 0 48px; }
.eh-startside__name { font-family: 'DM Sans', sans-serif; font-size: 48px; font-weight: 900; letter-spacing: 0.04em; line-height: 1.1; color: #12161C; margin-bottom: 28px; opacity: 0; transform: translateY(18px); animation: eh-fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards; }
.eh-startside__btn { display: block; padding: 14px 48px; min-width: 200px; text-align: center; text-decoration: none; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; border-radius: 999px; border: 2.5px solid #12161C; color: #12161C; background: #F7F9F8; transition: background 0.3s, color 0.3s; opacity: 0; transform: translateY(18px); animation: eh-fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
.eh-startside__btn:hover { background: #12161C; color: #F7F9F8; }
@keyframes eh-fadeUp { to { opacity: 1; transform: translateY(0); } }
@media (orientation: portrait) {
  .eh-startside__block { top: auto; bottom: 0; left: 0; right: 0; width: 100%; height: 50%; transform: translateY(100%); }
  .eh-startside[data-mounted="true"] .eh-startside__block { transform: translateY(0); }
  .eh-startside__ui { top: 48px; left: 48px; right: auto; transform: none; }
}
.eh-header { position: sticky; top: 0; z-index: 10; background: rgba(245, 245, 247, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0, 0, 0, 0.08); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.eh-header__text { flex: 1; min-width: 0; }
.eh-header__title { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: -0.01em; color: #0d0f14; }
.eh-header__sub { color: #6e6e73; font-size: 0.82rem; margin-top: 0.2rem; }
.eh-header__home { flex-shrink: 0; display: inline-flex; align-items: center; gap: 0.4rem; text-decoration: none; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #0d0f14; border: 2.5px solid #0d0f14; border-radius: 999px; padding: 0.5rem 1.2rem; transition: background 0.25s, color 0.25s; }
.eh-header__home:hover { background: #0d0f14; color: #F7F9F8; }
.eh-filter { display: flex; justify-content: center; gap: 0.75rem; margin: 2.5rem 2rem 2rem; flex-wrap: wrap; }
.eh-filter__btn { background: transparent; border: 2.5px solid #0d0f14; color: #0d0f14; padding: 0.5rem 1.4rem; border-radius: 999px; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: background 0.25s, color 0.25s; }
.eh-filter__btn:hover, .eh-filter__btn.is-active { background: #0d0f14; color: #F7F9F8; }
.eh-grid-wrap { max-width: 1100px; margin: 0 auto; padding: 0 2rem 5rem; }
.eh-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
.eh-tile { background: #F7F9F8; border-radius: 1.25rem; padding: 1.5rem; padding-top: 3rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04); display: flex; flex-direction: column; text-align: center; position: relative; cursor: pointer; transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), box-shadow 0.22s cubic-bezier(0.22,1,0.36,1); }
.eh-tile:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06); }
.eh-tile__badge { position: absolute; top: 1rem; left: 1rem; padding: 0.25rem 0.65rem; border-radius: 999px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: #0d0f14; color: #F7F9F8; }
.eh-tile__fag { position: absolute; top: 1rem; right: 1rem; padding: 0.25rem 0.65rem; border-radius: 999px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.02em; background: rgba(0,0,0,0.06); color: #1d1d1f; }
.eh-tile__title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 0.85rem; color: #1d1d1f; }
.eh-tile__img { width: 100%; aspect-ratio: 1/1; border-radius: 0.75rem; margin-bottom: 1rem; background: #e8e8ea; background-image: radial-gradient(circle at 50% 55%, rgba(0,0,0,0.04), transparent 60%); }
.eh-tile__text { font-size: 0.88rem; line-height: 1.55; color: #6e6e73; margin-bottom: 1.25rem; flex-grow: 1; }
.eh-tile__btn { margin-top: auto; align-self: center; padding: 0.5rem 1.4rem; border-radius: 999px; border: 2.5px solid #0d0f14; background: transparent; color: #0d0f14; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: background 0.25s, color 0.25s; }
.eh-tile__btn:hover { background: #0d0f14; color: #F7F9F8; }
.eh-detail { max-width: 720px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }
.eh-detail__back, .eh-detail__pdf { display: inline-flex; align-items: center; gap: 0.4rem; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #0d0f14; background: none; border: 2.5px solid #0d0f14; border-radius: 999px; padding: 0.5rem 1.2rem; cursor: pointer; transition: background 0.25s, color 0.25s; }
.eh-detail__back { margin-bottom: 2rem; }
.eh-detail__pdf  { margin-top: 1.5rem; }
.eh-detail__back:hover, .eh-detail__pdf:hover { background: #0d0f14; color: #fff; }
.eh-detail__inner { background: #F7F9F8; border-radius: 1.25rem; padding: 2.5rem 3rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04); line-height: 1.7; }
.eh-detail__inner h1 { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; font-size: 1.7rem; font-weight: 900; margin-bottom: 0.4rem; line-height: 1.15; letter-spacing: -0.02em; color: #1d1d1f; }
.eh-detail__inner h2 { font-size: 1rem; font-weight: 700; margin: 2rem 0 0.6rem; padding-bottom: 0.3rem; border-bottom: 1px solid rgba(0,0,0,0.07); letter-spacing: -0.01em; color: #1d1d1f; }
.eh-detail__inner p  { margin-bottom: 0.9rem; font-size: 0.93rem; color: #1d1d1f; }
.eh-detail__inner ul, .eh-detail__inner ol { padding-left: 1.4rem; margin-bottom: 0.9rem; }
.eh-detail__inner li { margin-bottom: 0.3rem; font-size: 0.93rem; color: #1d1d1f; }
.eh-detail__inner blockquote { border-left: 3px solid rgba(0,0,0,0.12); padding-left: 1rem; color: #6e6e73; font-style: italic; margin: 1rem 0; }

  html,body{margin:0;height:100%;}
  body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#F7F9F8;}
  /* Kit switcher — small chrome outside the design */
  .kit-switcher{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
    display:flex;gap:8px;padding:6px;
    background:rgba(247,249,248,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(0,0,0,0.08);border-radius:999px;
    box-shadow:0 2px 12px rgba(0,0,0,0.06),0 1px 4px rgba(0,0,0,0.04);
  }
  .kit-switcher button{
    font-family:inherit;background:transparent;border:none;color:#0d0f14;cursor:pointer;
    padding:7px 16px;border-radius:999px;
    font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    transition:background .22s cubic-bezier(.22,1,.36,1),color .22s cubic-bezier(.22,1,.36,1);
  }
  .kit-switcher button.active{background:#0d0f14;color:#F7F9F8;}
</style>
</head>
<body>

<div id="root"></div>

<div class="kit-switcher" id="switcher">
  <button data-view="startside" class="active">Startside</button>
  <button data-view="rutenett">Rutenettside</button>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect } = React;

/* ═══════════ Startside ═══════════ */
function Startside({ onNavigate }) {
  const [mounted, setMounted] = useState(false);
  useEffect(() => { const t = setTimeout(() => setMounted(true), 20); return () => clearTimeout(t); }, []);
  return (
    <div className="eh-startside" data-mounted={mounted}>
      <div className="eh-startside__block" />
      <div className="eh-startside__ui">
        <p className="eh-startside__name">Eirik<br/>Hodne</p>
        <a href="#" onClick={e => { e.preventDefault(); onNavigate('kode'); }}
           className="eh-startside__btn" style={{ animationDelay: '0.4s' }}>Kodeeksempler</a>
        <a href="#" onClick={e => { e.preventDefault(); onNavigate('svg'); }}
           className="eh-startside__btn" style={{ animationDelay: '0.65s' }}>Vektorverkstedet</a>
        <a href="#" onClick={e => { e.preventDefault(); onNavigate('undervisning'); }}
           className="eh-startside__btn" style={{ animationDelay: '0.95s' }}>Undervisningsopplegg</a>
      </div>
    </div>
  );
}

/* ═══════════ Rutenettside ═══════════ */
const DEMO = [
  { id: 'tekstskaping', tittel: 'Tekstskaping', fag: 'Norsk', undertekst: 'Elevene utforsker stemmen sin gjennom småtekster og delte utkast.', tags: ['fremhevet'] },
  { id: 'funksjoner', tittel: 'Funksjoner i hverdagen', fag: 'Matematikk', undertekst: 'Kobler lineære funksjoner til dagligdagse situasjoner elevene kjenner.', tags: ['fremhevet'] },
  { id: 'kildekritikk', tittel: 'Kildekritikk på nett', fag: 'Samfunn', undertekst: 'En praktisk økt om å lese, sjekke og sammenligne kilder.', tags: [] },
  { id: 'geometri', tittel: 'Geometri i rommet', fag: 'Matematikk', undertekst: 'Tredimensjonal tenkning med papp, lim og enkle modeller.', tags: ['fremhevet'] },
  { id: 'lesestrategier', tittel: 'Lesestrategier', fag: 'Norsk', undertekst: 'Før, under og etter-lesing — en verktøykasse elevene kan eie.', tags: [] },
  { id: 'algoritmer', tittel: 'Algoritmisk tenkning', fag: 'Matematikk', undertekst: 'Uten datamaskin. Bare oppgaver, flytdiagrammer og dialog.', tags: [] }
];

const DETAIL_MD = {
  tekstskaping: `# Tekstskaping\n\nEt opplegg om å finne stemmen sin gjennom korte tekster og delte utkast.\n\n## Læringsmål\n\n- Produsere korte tekster i ulike sjangre\n- Gi og ta imot respons i par\n- Revidere egen tekst basert på tilbakemelding\n\n## Gjennomføring\n\nStart med en lav terskel — to minutter fri skriving. Del i par. Les høyt. Still ett spørsmål hver.\n\n> Det er ikke teksten som skal bli perfekt. Det er eleven som skal bli trygg.\n\nRepeter med ny sjanger neste økt.`,
  funksjoner: `# Funksjoner i hverdagen\n\nEt kort opplegg som kobler lineære funksjoner til situasjoner elevene allerede kjenner — mobilabonnement, bussbilletter, turpriser.\n\n## Aktiviteter\n\n1. Samle tre prisstrukturer fra nett\n2. Modeller hver som y = ax + b\n3. Sammenlign grafisk i GeoGebra`,
  kildekritikk: `# Kildekritikk på nett\n\nEn økt der elevene lærer å spørre: *hvem står bak, når ble det skrevet, hvorfor ble det skrevet, og hvem vil tjene på det?*`,
  geometri: `# Geometri i rommet\n\nTredimensjonal tenkning uten høyteknologi. Papp, lim, saks.`,
  lesestrategier: `# Lesestrategier\n\nFør, under og etter-lesing. En verktøykasse elevene kan eie selv.`,
  algoritmer: `# Algoritmisk tenkning\n\nUten datamaskin. Bare oppgaver, flytdiagrammer og dialog.`
};

function FilterBar({ tags, active, onChange }) {
  return (
    <div className="eh-filter">
      {tags.map(t => (
        <button key={t.key} onClick={() => onChange(t.key)}
                className={'eh-filter__btn' + (active === t.key ? ' is-active' : '')}>{t.label}</button>
      ))}
    </div>
  );
}

function Tile({ opplegg, onOpen }) {
  const erFremhevet = (opplegg.tags || []).includes('fremhevet');
  return (
    <div className="eh-tile" onClick={() => onOpen(opplegg)}>
      {erFremhevet && <span className="eh-tile__badge">Fremhevet</span>}
      {opplegg.fag && <span className="eh-tile__fag">{opplegg.fag}</span>}
      <h4 className="eh-tile__title">{opplegg.tittel}</h4>
      <div className="eh-tile__img" aria-hidden="true" />
      <p className="eh-tile__text">{opplegg.undertekst}</p>
      <button className="eh-tile__btn" onClick={e => { e.stopPropagation(); onOpen(opplegg); }}>Les opplegget</button>
    </div>
  );
}

function tinyMd(src) {
  return src.split(/\n\n+/).map((blk, i) => {
    if (blk.startsWith('# ')) return <h1 key={i}>{blk.slice(2)}</h1>;
    if (blk.startsWith('## ')) return <h2 key={i}>{blk.slice(3)}</h2>;
    if (blk.startsWith('> ')) return <blockquote key={i}>{blk.slice(2)}</blockquote>;
    if (/^[-*] /m.test(blk)) return <ul key={i}>{blk.split('\n').map((l, j) => <li key={j}>{l.replace(/^[-*] /, '')}</li>)}</ul>;
    if (/^\d+\. /m.test(blk)) return <ol key={i}>{blk.split('\n').map((l, j) => <li key={j}>{l.replace(/^\d+\. /, '')}</li>)}</ol>;
    return <p key={i}>{blk}</p>;
  });
}

function Detail({ opplegg, onBack }) {
  return (
    <div className="eh-detail">
      <button className="eh-detail__back" onClick={onBack}>← Tilbake til oversikten</button>
      <div className="eh-detail__inner">{tinyMd(DETAIL_MD[opplegg.id] || '# ' + opplegg.tittel)}</div>
      <button className="eh-detail__pdf" onClick={() => window.print()}>↓ Last ned som PDF</button>
    </div>
  );
}

function Rutenettside({ onGoHome }) {
  const [active, setActive] = useState('fremhevet');
  const [detail, setDetail] = useState(null);
  const fag = [...new Set(DEMO.map(d => d.fag).filter(Boolean))].sort();
  const tags = [
    { key: 'fremhevet', label: 'Fremhevet' },
    { key: 'alle', label: 'Alle' },
    ...fag.map(f => ({ key: f.toLowerCase(), label: f }))
  ];
  const filtered = active === 'alle' ? DEMO
    : active === 'fremhevet' ? DEMO.filter(d => (d.tags || []).includes('fremhevet'))
    : DEMO.filter(d => (d.fag || '').toLowerCase() === active);

  if (detail) {
    return (
      <div className="eh-page">
        <Detail opplegg={detail} onBack={() => setDetail(null)} />
      </div>
    );
  }
  return (
    <div className="eh-page">
      <header className="eh-header">
        <div className="eh-header__text">
          <h1 className="eh-header__title">Undervisningsopplegg (under arbeid)</h1>
          <p className="eh-header__sub">Noen av mine favorittopplegg. Tekstene er basert på KI-intervju med meg. Mer ressurser og bilder kommer etterhvert.</p>
        </div>
        <a href="#" className="eh-header__home" onClick={e => { e.preventDefault(); onGoHome && onGoHome(); }}>← eirikhodne.no</a>
      </header>
      <FilterBar tags={tags} active={active} onChange={setActive} />
      <div className="eh-grid-wrap">
        <div className="eh-grid">
          {filtered.map(o => <Tile key={o.id} opplegg={o} onOpen={setDetail} />)}
        </div>
      </div>
    </div>
  );
}

/* ═══════════ App + switcher ═══════════ */
function App() {
  const [view, setView] = useState(() => localStorage.getItem('eh-kit-view') || 'startside');
  useEffect(() => {
    localStorage.setItem('eh-kit-view', view);
    document.querySelectorAll('#switcher button').forEach(b =>
      b.classList.toggle('active', b.dataset.view === view)
    );
  }, [view]);
  useEffect(() => {
    const handler = e => {
      const v = e.target.closest('button[data-view]');
      if (v) setView(v.dataset.view);
    };
    const el = document.getElementById('switcher');
    el.addEventListener('click', handler);
    return () => el.removeEventListener('click', handler);
  }, []);
  if (view === 'rutenett') return <Rutenettside key="r" onGoHome={() => setView('startside')} />;
  return <Startside key="s" onNavigate={(dest) => { if (dest === 'undervisning') setView('rutenett'); }} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
