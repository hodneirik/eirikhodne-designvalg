<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#F7F9F8;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
  .card{padding:24px 28px;}
  h4{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6e6e73;margin:0 0 14px;font-weight:700;}
  .swatches{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .sw{display:flex;align-items:center;gap:14px;}
  .chip{width:56px;height:56px;border-radius:12px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
  .info{display:flex;flex-direction:column;gap:2px;}
  .name{font-size:13px;font-weight:700;color:#12161C;}
  .hex{font-family:"SF Mono","Fira Code",monospace;font-size:11px;color:#6e6e73;}
</style></head>
<body><div class="card">
  <h4>Core duo · Ink &amp; paper</h4>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#12161C"></div><div class="info"><span class="name">Ink</span><span class="hex">#12161C</span></div></div>
    <div class="sw"><div class="chip" style="background:#F7F9F8"></div><div class="info"><span class="name">Paper</span><span class="hex">#F7F9F8</span></div></div>
    <div class="sw"><div class="chip" style="background:#0d0f14"></div><div class="info"><span class="name">Ink-deep</span><span class="hex">#0d0f14</span></div></div>
    <div class="sw"><div class="chip" style="background:#f5f5f7"></div><div class="info"><span class="name">BG (Apple-grey)</span><span class="hex">#f5f5f7</span></div></div>
  </div>
</div></body></html>
