<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#F7F9F8;color:#1d1d1f;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
  .card{padding:28px 32px;}
  .row{display:flex;align-items:baseline;gap:24px;border-bottom:1px solid rgba(0,0,0,.06);padding:14px 0;}
  .row:last-child{border-bottom:none;}
  .spec{font-family:"SF Mono","Fira Code",monospace;font-size:11px;color:#6e6e73;min-width:160px;letter-spacing:.02em;}
  .h3{font-size:17.6px;font-weight:700;letter-spacing:-.01em;color:#1d1d1f;}
  .body{font-size:14.88px;line-height:1.55;color:#1d1d1f;}
  .meta{font-size:13.12px;color:#6e6e73;}
  .small{font-size:14.08px;color:#1d1d1f;}
</style></head>
<body><div class="card">
  <div class="row"><span class="spec">System · 700 · 17.6px</span><span class="h3">Kort-tittel</span></div>
  <div class="row"><span class="spec">System · 400 · 14.88px</span><span class="body">Brødtekst med rolig, behagelig leselinje.</span></div>
  <div class="row"><span class="spec">System · 400 · 14.08px</span><span class="small">Kort-beskrivelse med litt mindre vekt.</span></div>
  <div class="row"><span class="spec">System · 400 · 13.12px</span><span class="meta">Metadata og bildetekster</span></div>
</div></body></html>
