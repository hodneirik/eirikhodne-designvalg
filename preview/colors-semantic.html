<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#F7F9F8;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
  .card{padding:24px 28px;}
  h4{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6e6e73;margin:0 0 14px;font-weight:700;}
  .rows{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .sw{display:flex;align-items:center;gap:12px;}
  .chip{width:44px;height:44px;border-radius:10px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
  .info{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .name{font-size:12px;font-weight:700;color:#12161C;}
  .use{font-size:11px;color:#6e6e73;}
</style></head>
<body><div class="card">
  <h4>Semantic surfaces &amp; text</h4>
  <div class="rows">
    <div class="sw"><div class="chip" style="background:#1d1d1f"></div><div class="info"><span class="name">--fg</span><span class="use">Body text · #1d1d1f</span></div></div>
    <div class="sw"><div class="chip" style="background:#6e6e73"></div><div class="info"><span class="name">--fg-2</span><span class="use">Secondary · #6e6e73</span></div></div>
    <div class="sw"><div class="chip" style="background:#f5f5f7"></div><div class="info"><span class="name">--bg</span><span class="use">Page · #f5f5f7</span></div></div>
    <div class="sw"><div class="chip" style="background:#F7F9F8"></div><div class="info"><span class="name">--card</span><span class="use">Card surface · #F7F9F8</span></div></div>
    <div class="sw"><div class="chip" style="background:rgba(0,0,0,0.08)"></div><div class="info"><span class="name">--hairline</span><span class="use">rgba(0,0,0,.08)</span></div></div>
    <div class="sw"><div class="chip" style="background:rgba(0,0,0,0.06)"></div><div class="info"><span class="name">--tag-bg</span><span class="use">rgba(0,0,0,.06)</span></div></div>
  </div>
</div></body></html>
