<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#f5f5f7;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#1d1d1f;}
  .wrap{padding:24px 28px;}
  h4{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6e6e73;margin:0 0 18px;font-weight:700;}
  .tile{background:#F7F9F8;border-radius:20px;padding:24px;padding-top:48px;box-shadow:0 2px 12px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);width:240px;text-align:center;position:relative;}
  .tile-badge{position:absolute;top:16px;left:16px;padding:4px 10px;border-radius:999px;font-size:10.4px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:#12161C;color:#F7F9F8;}
  .tile-fag{position:absolute;top:16px;right:16px;padding:4px 10px;border-radius:999px;font-size:10.4px;font-weight:600;background:rgba(0,0,0,.06);color:#1d1d1f;}
  h4.t{font-size:17.6px;font-weight:700;letter-spacing:-.01em;margin:0 0 14px;color:#1d1d1f;}
  .img{width:100%;aspect-ratio:1/1;border-radius:12px;background:#e8e8ea;margin-bottom:16px;display:flex;align-items:center;justify-content:center;color:#c7c7cc;font-size:28px;}
  .txt{font-size:14.08px;line-height:1.55;color:#6e6e73;margin:0 0 20px;}
  .btn{padding:8px 22px;border-radius:999px;border:2.5px solid #12161C;background:transparent;color:#12161C;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-family:inherit;cursor:pointer;}
</style></head>
<body><div class="wrap"><div style="display:flex;align-items:flex-start;gap:24px;"><div class="tile">
  <span class="tile-badge">Fremhevet</span>
  <span class="tile-fag">Norsk</span>
  <h4 class="t">Tekstskaping</h4>
  <div class="img">▢</div>
  <p class="txt">Elevene utforsker stemmen sin gjennom småtekster og delte utkast.</p>
  <button class="btn">Les opplegget</button>
</div><div style="display:flex;flex-direction:column;gap:6px;padding-top:8px;"><span style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6e6e73;font-weight:700;">Tile · rutenettside.html</span><span style="font-family:'SF Mono',monospace;font-size:10.5px;color:#6e6e73;">260–280px wide<br>radius 20px · shadow rest</span></div></div></div></body></html>
