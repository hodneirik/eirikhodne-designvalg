<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#f5f5f7;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#12161C;}
  .card{padding:28px;}
  h4{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6e6e73;margin:0 0 18px;font-weight:700;}
  .row{display:flex;gap:32px;align-items:flex-end;}
  .box{background:#F7F9F8;border-radius:20px;width:160px;height:88px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#6e6e73;}
  .rest{box-shadow:0 2px 12px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);}
  .lift{box-shadow:0 10px 28px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);transform:translateY(-3px);}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .lbl{font-family:"SF Mono","Fira Code",monospace;font-size:10.5px;color:#6e6e73;text-align:center;}
  .name{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;}
</style></head>
<body><div class="card">
  <h4>Elevation · two-layer, Apple-soft</h4>
  <div class="row">
    <div class="col"><div class="box rest">Resting</div><span class="name">Rest</span><span class="lbl">0 2px 12px / .06<br>+ 0 1px 4px / .04</span></div>
    <div class="col"><div class="box lift">Lifted</div><span class="name">Hover</span><span class="lbl">0 10px 28px / .10<br>+ 0 2px 6px / .06</span></div>
  </div>
</div></body></html>
