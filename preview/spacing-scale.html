<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#F7F9F8;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#12161C;}
  .card{padding:24px 28px;}
  h4{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6e6e73;margin:0 0 14px;font-weight:700;}
  .row{display:flex;align-items:center;gap:16px;padding:6px 0;}
  .token{font-family:"SF Mono","Fira Code",monospace;font-size:11px;color:#6e6e73;min-width:90px;}
  .bar{height:14px;background:#12161C;border-radius:3px;}
  .val{font-family:"SF Mono","Fira Code",monospace;font-size:10.5px;color:#6e6e73;margin-left:auto;}
</style></head>
<body><div class="card">
  <h4>Spacing scale · rem</h4>
  <div class="row"><span class="token">--space-1</span><div class="bar" style="width:4px"></div><span class="val">0.25rem · 4px</span></div>
  <div class="row"><span class="token">--space-2</span><div class="bar" style="width:8px"></div><span class="val">0.5rem · 8px</span></div>
  <div class="row"><span class="token">--space-3</span><div class="bar" style="width:12px"></div><span class="val">0.75rem · 12px</span></div>
  <div class="row"><span class="token">--space-4</span><div class="bar" style="width:16px"></div><span class="val">1rem · 16px</span></div>
  <div class="row"><span class="token">--space-5</span><div class="bar" style="width:20px"></div><span class="val">1.25rem · 20px</span></div>
  <div class="row"><span class="token">--space-6</span><div class="bar" style="width:24px"></div><span class="val">1.5rem · 24px</span></div>
  <div class="row"><span class="token">--space-8</span><div class="bar" style="width:32px"></div><span class="val">2rem · 32px</span></div>
  <div class="row"><span class="token">--space-10</span><div class="bar" style="width:40px"></div><span class="val">2.5rem · 40px</span></div>
  <div class="row"><span class="token">--space-12</span><div class="bar" style="width:48px"></div><span class="val">3rem · 48px</span></div>
</div></body></html>
