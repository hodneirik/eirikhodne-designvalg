<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@900&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#F7F9F8;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#12161C;}
  .wrap{padding:28px;display:flex;align-items:center;gap:40px;}
  .mark{font-family:'DM Sans',sans-serif;font-weight:900;font-size:60px;letter-spacing:.04em;line-height:1.1;color:#12161C;}
  .meta{display:flex;flex-direction:column;gap:8px;}
  .lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6e6e73;font-weight:700;}
  .sub{font-family:"SF Mono","Fira Code",monospace;font-size:11px;color:#6e6e73;line-height:1.6;}
</style></head>
<body><div class="wrap">
  <p class="mark">Eirik<br>Hodne</p>
  <div class="meta">
    <span class="lbl">Wordmark</span>
    <span class="sub">DM Sans · 900<br>letter-spacing .04em<br>line-height 1.1<br>Break after first name</span>
  </div>
</div></body></html>
