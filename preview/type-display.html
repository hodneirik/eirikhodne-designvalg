<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F7F9F8;}
  .card{padding:28px 32px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#12161C;}
  .row{display:flex;align-items:baseline;gap:24px;border-bottom:1px solid rgba(0,0,0,0.06);padding:16px 0;}
  .row:last-child{border-bottom:none;}
  .spec{font-family:"SF Mono","Fira Code",monospace;font-size:11px;color:#6e6e73;min-width:140px;letter-spacing:.02em;}
  .display{font-family:'DM Sans',sans-serif;font-weight:900;letter-spacing:.04em;line-height:1.1;font-size:44px;}
  .h1{font-family:'DM Sans',sans-serif;font-weight:900;letter-spacing:-.02em;font-size:27px;line-height:1.15;}
  .h2{font-family:'DM Sans',sans-serif;font-weight:900;letter-spacing:-.01em;font-size:22px;}
</style></head>
<body><div class="card">
  <div class="row"><span class="spec">DM Sans 900 · 48px</span><span class="display">Eirik Hodne</span></div>
  <div class="row"><span class="spec">DM Sans 900 · 27px</span><span class="h1">Undervisningsopplegg</span></div>
  <div class="row"><span class="spec">DM Sans 900 · 22px</span><span class="h2">Noen av mine favorittopplegg</span></div>
</div></body></html>
