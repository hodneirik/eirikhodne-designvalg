<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#F7F9F8;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
  .card{padding:24px 28px;}
  h4{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6e6e73;margin:0 0 14px;font-weight:700;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:62px;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);}
  .name{font-size:11px;font-weight:700;color:#12161C;}
  .hex{font-family:"SF Mono","Fira Code",monospace;font-size:10px;color:#6e6e73;}
</style></head>
<body><div class="card">
  <h4>Accent palette · Light mode</h4>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#788CA0"></div><span class="name">Slate</span><span class="hex">#788CA0</span></div>
    <div class="sw"><div class="chip" style="background:#AABEA0"></div><span class="name">Sage</span><span class="hex">#AABEA0</span></div>
    <div class="sw"><div class="chip" style="background:#E6D2AA"></div><span class="name">Sand</span><span class="hex">#E6D2AA</span></div>
    <div class="sw"><div class="chip" style="background:#C8A096"></div><span class="name">Clay</span><span class="hex">#C8A096</span></div>
    <div class="sw"><div class="chip" style="background:#A096B4"></div><span class="name">Lilac</span><span class="hex">#A096B4</span></div>
  </div>
</div></body></html>
