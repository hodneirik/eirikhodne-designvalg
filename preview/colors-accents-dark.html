<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#12161C;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}
  .card{padding:24px 28px;}
  h4{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#98989d;margin:0 0 14px;font-weight:700;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:62px;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);}
  .name{font-size:11px;font-weight:700;color:#f0f0f0;}
  .hex{font-family:"SF Mono","Fira Code",monospace;font-size:10px;color:#98989d;}
</style></head>
<body><div class="card">
  <h4>Accent palette · Dark mode · lifted</h4>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#8CAAD2"></div><span class="name">Slate</span><span class="hex">#8CAAD2</span></div>
    <div class="sw"><div class="chip" style="background:#A0D2B9"></div><span class="name">Sage</span><span class="hex">#A0D2B9</span></div>
    <div class="sw"><div class="chip" style="background:#F0D2A0"></div><span class="name">Sand</span><span class="hex">#F0D2A0</span></div>
    <div class="sw"><div class="chip" style="background:#EBA596"></div><span class="name">Clay</span><span class="hex">#EBA596</span></div>
    <div class="sw"><div class="chip" style="background:#BEAFE1"></div><span class="name">Lilac</span><span class="hex">#BEAFE1</span></div>
  </div>
</div></body></html>
