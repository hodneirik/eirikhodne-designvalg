<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#F7F9F8;}
  .card{padding:28px 32px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#12161C;}
  .row{display:flex;align-items:center;gap:24px;border-bottom:1px solid rgba(0,0,0,.06);padding:14px 0;}
  .row:last-child{border-bottom:none;}
  .spec{font-family:"SF Mono","Fira Code",monospace;font-size:11px;color:#6e6e73;min-width:160px;letter-spacing:.02em;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;}
  .badge{font-size:10.4px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:#12161C;color:#F7F9F8;padding:4px 10px;border-radius:999px;}
  .tag{font-size:10.4px;font-weight:500;letter-spacing:.02em;background:rgba(0,0,0,.06);color:#1d1d1f;padding:4px 10px;border-radius:999px;}
  code{font-family:"SF Mono","Fira Code",monospace;font-size:12.58px;background:#f5f5f7;padding:2.4px 6.4px;border-radius:5px;color:#1d1d1f;}
</style></head>
<body><div class="card">
  <div class="row"><span class="spec">Eyebrow · 11px · .2em</span><span class="eyebrow">KODEEKSEMPLER</span></div>
  <div class="row"><span class="spec">Badge · 10.4px · .1em</span><span class="badge">Fremhevet</span></div>
  <div class="row"><span class="spec">Tag · 10.4px · .02em</span><span class="tag">Matematikk</span></div>
  <div class="row"><span class="spec">Inline code · 12.58px</span><code>var(--ink)</code></div>
</div></body></html>
