<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<style>
  html,body{margin:0;background:#F7F9F8;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#12161C;}
  .card{padding:28px;}
  h4{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#6e6e73;margin:0 0 20px;font-weight:700;}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 36px;min-width:180px;text-decoration:none;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;border-radius:999px;border:2.5px solid #12161C;color:#12161C;background:#F7F9F8;cursor:pointer;transition:background .22s cubic-bezier(.22,1,.36,1),color .22s cubic-bezier(.22,1,.36,1);font-family:inherit;}
  .btn.filled{background:#12161C;color:#F7F9F8;}
  .btn.sm{padding:8px 20px;min-width:0;letter-spacing:.18em;}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
  .lbl{font-family:"SF Mono","Fira Code",monospace;font-size:10.5px;color:#6e6e73;margin-left:8px;}
</style></head>
<body><div class="card">
  <h4>Buttons · the signature pill</h4>
  <div class="row">
    <button class="btn">Kodeeksempler</button>
    <button class="btn filled">Kodeeksempler</button>
    <span class="lbl">Rest · Hover (invert)</span>
  </div>
  <div class="row">
    <button class="btn sm">Alle</button>
    <button class="btn sm filled">Fremhevet</button>
    <button class="btn sm">Matematikk</button>
    <span class="lbl">Filter · small pill</span>
  </div>
</div></body></html>
